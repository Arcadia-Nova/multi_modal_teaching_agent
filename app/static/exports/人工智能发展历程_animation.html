<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>人工智能发展历程 - 幻灯片动画</title><style>body { font-family: Arial, sans-serif; margin: 0; padding: 0; overflow: hidden; }.slideshow-container { position: relative; width: 100vw; height: 100vh; }.slide { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #f0f0f0; }.slide.active { opacity: 1; }.slide h2 { font-size: 2.5em; color: #333; margin-bottom: 20px; text-align: center; }.slide p { font-size: 1.2em; color: #666; max-width: 800px; text-align: center; padding: 0 20px; }.controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }.control-btn { width: 15px; height: 15px; border-radius: 50%; background-color: #ccc; cursor: pointer; }.control-btn.active { background-color: #4CAF50; }.nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.8); border: none; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 10; }.prev-btn { left: 20px; }.next-btn { right: 20px; }</style></head><body><div class="slideshow-container"><div class="slide" id="slide-0"><h2>1956年</h2><p>人工智能概念诞生</p></div><div class="slide" id="slide-1"><h2>1960-1970年代</h2><p>早期AI研究与发展</p></div><div class="slide" id="slide-2"><h2>1980-1990年代</h2><p>专家系统与机器学习兴起</p></div><div class="slide" id="slide-3"><h2>2000年代</h2><p>大数据与深度学习发展</p></div><div class="slide" id="slide-4"><h2>2010年代至今</h2><p>AI技术突破与广泛应用</p></div><button class="nav-btn prev-btn" onclick="prevSlide()">←</button><button class="nav-btn next-btn" onclick="nextSlide()">→</button><div class="controls" id="controls"><div class="control-btn" id="control-0" onclick="goToSlide(0)"></div><div class="control-btn" id="control-1" onclick="goToSlide(1)"></div><div class="control-btn" id="control-2" onclick="goToSlide(2)"></div><div class="control-btn" id="control-3" onclick="goToSlide(3)"></div><div class="control-btn" id="control-4" onclick="goToSlide(4)"></div></div></div><script>let currentSlide = 0;const slides = document.querySelectorAll(".slide");const controls = document.querySelectorAll(".control-btn");const totalSlides = slides.length;function showSlide(index) {slides.forEach((slide, i) => {slide.classList.remove("active");controls[i].classList.remove("active");});slides[index].classList.add("active");controls[index].classList.add("active");currentSlide = index;}function nextSlide() {let nextIndex = currentSlide + 1;if (nextIndex >= totalSlides) nextIndex = 0;showSlide(nextIndex);}function prevSlide() {let prevIndex = currentSlide - 1;if (prevIndex < 0) prevIndex = totalSlides - 1;showSlide(prevIndex);}function goToSlide(index) {showSlide(index);}// 自动播放let autoplayInterval = setInterval(nextSlide, 5000);// 初始化显示第一张幻灯片showSlide(0);</script></body></html>

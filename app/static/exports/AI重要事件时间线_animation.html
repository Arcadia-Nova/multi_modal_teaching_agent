<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI重要事件时间线 - 时间线动画</title><style>body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f0f0; }.container { max-width: 1000px; margin: 0 auto; }h1 { text-align: center; color: #333; margin-bottom: 50px; }.timeline { position: relative; margin: 0 auto; padding: 40px 0; }.timeline::after { content: ""; position: absolute; width: 6px; background-color: #4CAF50; top: 0; bottom: 0; left: 50%; margin-left: -3px; }.timeline-item { padding: 10px 40px; position: relative; width: 45%; box-sizing: border-box; }.timeline-item.left { left: 0; }.timeline-item.right { left: 55%; }.timeline-item::after { content: ""; position: absolute; width: 25px; height: 25px; right: -13px; top: 15px; border-radius: 50%; background-color: white; border: 4px solid #4CAF50; z-index: 1; }.timeline-item.right::after { left: -13px; }.timeline-content { padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }.timeline-content.visible { opacity: 1; transform: translateY(0); }.timeline-content h2 { margin-top: 0; color: #4CAF50; }.timeline-content p { margin-bottom: 0; color: #666; }@media screen and (max-width: 768px) {.timeline::after { left: 31px; }.timeline-item { width: 100%; padding-left: 70px; padding-right: 25px; }.timeline-item.right { left: 0%; }.timeline-item::after { left: 18px; }.timeline-item.right::after { left: 18px; }}</style></head><body><div class="container"><h1>AI重要事件时间线</h1><div class="timeline" id="timeline"><div class="timeline-item left"><div class="timeline-content"><h2>1956年</h2><p>达特茅斯会议，AI概念正式提出</p></div></div><div class="timeline-item right"><div class="timeline-content"><h2>1969年</h2><p>第一个专家系统DENDRAL开发成功</p></div></div><div class="timeline-item left"><div class="timeline-content"><h2>1997年</h2><p>IBM深蓝战胜国际象棋世界冠军卡斯帕罗夫</p></div></div><div class="timeline-item right"><div class="timeline-content"><h2>2011年</h2><p>IBM Watson在Jeopardy!节目中获胜</p></div></div><div class="timeline-item left"><div class="timeline-content"><h2>2016年</h2><p>AlphaGo战胜围棋世界冠军李世石</p></div></div></div></div><script>function checkVisibility() {const items = document.querySelectorAll(".timeline-content");items.forEach(item => {const rect = item.getBoundingClientRect();const windowHeight = window.innerHeight || document.documentElement.clientHeight;if (rect.top <= windowHeight * 0.8) {item.classList.add("visible");}});}// 初始检查checkVisibility();// 滚动时检查window.addEventListener("scroll", checkVisibility);</script></body></html>

<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>机器学习 - 问答游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.question { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }.question h3 { margin-top: 0; color: #555; }.options { margin-top: 10px; }.option { margin: 5px 0; padding: 10px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }.option:hover { background-color: #e9e9e9; }.option.correct { background-color: #d4edda; border-color: #c3e6cb; }.option.incorrect { background-color: #f8d7da; border-color: #f5c6cb; }.option.selected { background-color: #e3f2fd; border-color: #bbdefb; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#submit-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#submit-btn:hover { background-color: #45a049; }</style></head><body><div class="container"><h1>机器学习</h1><div id="quiz"><div class="question"><h3>问题 1: 在人工智能的发展背景下，机器学习的核心定义是什么？它与传统的基于规则的系统有何本质区别？</h3><div class="options"><div class="option" data-question="0" data-option="0">让计算机从数据中学习的技术</div><div class="option" data-question="0" data-option="1">人工编程的规则系统</div><div class="option" data-question="0" data-option="2">基于规则的专家系统</div><div class="option" data-question="0" data-option="3">传统的统计方法</div></div></div><div class="question"><h3>问题 2: 在机器学习的分类中，以下哪项不属于其典型类型？</h3><div class="options"><div class="option" data-question="1" data-option="0">监督学习</div><div class="option" data-question="1" data-option="1">无监督学习</div><div class="option" data-question="1" data-option="2">强化学习</div><div class="option" data-question="1" data-option="3">手动学习</div></div></div></div><button id="submit-btn">提交答案</button><div id="result"></div></div><script>const questions = [{"question": "\u5728\u4eba\u5de5\u667a\u80fd\u7684\u53d1\u5c55\u80cc\u666f\u4e0b\uff0c\u673a\u5668\u5b66\u4e60\u7684\u6838\u5fc3\u5b9a\u4e49\u662f\u4ec0\u4e48\uff1f\u5b83\u4e0e\u4f20\u7edf\u7684\u57fa\u4e8e\u89c4\u5219\u7684\u7cfb\u7edf\u6709\u4f55\u672c\u8d28\u533a\u522b\uff1f", "options": ["\u8ba9\u8ba1\u7b97\u673a\u4ece\u6570\u636e\u4e2d\u5b66\u4e60\u7684\u6280\u672f", "\u4eba\u5de5\u7f16\u7a0b\u7684\u89c4\u5219\u7cfb\u7edf", "\u57fa\u4e8e\u89c4\u5219\u7684\u4e13\u5bb6\u7cfb\u7edf", "\u4f20\u7edf\u7684\u7edf\u8ba1\u65b9\u6cd5"], "correct": 0}, {"question": "\u5728\u673a\u5668\u5b66\u4e60\u7684\u5206\u7c7b\u4e2d\uff0c\u4ee5\u4e0b\u54ea\u9879\u4e0d\u5c5e\u4e8e\u5176\u5178\u578b\u7c7b\u578b\uff1f", "options": ["\u76d1\u7763\u5b66\u4e60", "\u65e0\u76d1\u7763\u5b66\u4e60", "\u5f3a\u5316\u5b66\u4e60", "\u624b\u52a8\u5b66\u4e60"], "correct": 0}];const options = document.querySelectorAll(".option");const submitBtn = document.getElementById("submit-btn");const resultDiv = document.getElementById("result");let selectedAnswers = {};options.forEach(option => {option.addEventListener("click", function() {const question = this.getAttribute("data-question");const optionValue = this.getAttribute("data-option");document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === question) {opt.classList.remove("selected");}});this.classList.add("selected");selectedAnswers[question] = optionValue;});});submitBtn.addEventListener("click", function() {let score = 0;questions.forEach((q, index) => {const selected = selectedAnswers[index];if (selected && parseInt(selected) === q.correct) {score++;document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});} else if (selected) {document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === selected.toString()) {opt.classList.add("incorrect");}});document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});}});resultDiv.textContent = "得分: " + score + "/" + questions.length;submitBtn.disabled = true;});</script></body></html>

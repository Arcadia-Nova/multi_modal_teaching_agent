<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI术语 - 记忆游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }.card { aspect-ratio: 1; background-color: #4CAF50; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s ease; }.card.flipped { background-color: #2196F3; }.card.matched { background-color: #ff9800; cursor: default; }#score { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; }#reset-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#reset-btn:hover { background-color: #da190b; }</style></head><body><div class="container"><h1>AI术语</h1><div id="score">尝试次数: 0</div><div class="game-board" id="game-board"></div><button id="reset-btn">重新开始</button></div><script>const cards = ["\u4eba\u5de5\u667a\u80fd", "\u673a\u5668\u5b66\u4e60", "\u6df1\u5ea6\u5b66\u4e60", "\u795e\u7ecf\u7f51\u7edc", "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u8ba1\u7b97\u673a\u89c6\u89c9", "\u7b97\u6cd5", "\u6570\u636e\u96c6", "\u8bad\u7ec3\u6a21\u578b", "\u9884\u6d4b\u5206\u6790"];let gameBoard = document.getElementById("game-board");let scoreDisplay = document.getElementById("score");let resetBtn = document.getElementById("reset-btn");let flippedCards = [];let matchedPairs = 0;let attempts = 0;let gameActive = true;function initGame() {flippedCards = [];matchedPairs = 0;attempts = 0;gameActive = true;scoreDisplay.textContent = "尝试次数: " + attempts;gameBoard.innerHTML = "";let gameCards = [...cards, ...cards];gameCards.sort(() => Math.random() - 0.5);gameCards.forEach((card, index) => {const cardElement = document.createElement("div");cardElement.classList.add("card");cardElement.dataset.index = index;cardElement.dataset.value = card;cardElement.textContent = "?";cardElement.addEventListener("click", flipCard);gameBoard.appendChild(cardElement);});}function flipCard() {if (!gameActive || this.classList.contains("flipped") || this.classList.contains("matched")) {return;}this.classList.add("flipped");this.textContent = this.dataset.value;flippedCards.push(this);if (flippedCards.length === 2) {attempts++;scoreDisplay.textContent = "尝试次数: " + attempts;if (flippedCards[0].dataset.value === flippedCards[1].dataset.value) {flippedCards.forEach(card => {card.classList.add("matched");});matchedPairs++;if (matchedPairs === cards.length) {gameActive = false;scoreDisplay.textContent = "游戏完成! 尝试次数: " + attempts;}} else {gameActive = false;setTimeout(() => {flippedCards.forEach(card => {card.classList.remove("flipped");card.textContent = "?";});gameActive = true;}, 1000);}flippedCards = [];}}resetBtn.addEventListener("click", initGame);initGame();</script></body></html>

<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>好朋友的好处 - 匹配游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.game-area { display: flex; justify-content: space-around; margin: 20px 0; }.column { flex: 1; padding: 10px; }.item { padding: 10px; margin: 5px 0; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: grab; text-align: center; }.item:active { cursor: grabbing; }.drop-zone { min-height: 50px; border: 2px dashed #ccc; border-radius: 4px; margin: 5px 0; padding: 10px; text-align: center; }.drop-zone.active { border-color: #4CAF50; background-color: #f0f8f0; }.drop-zone.correct { border-color: #4CAF50; background-color: #d4edda; }.drop-zone.incorrect { border-color: #f44336; background-color: #f8d7da; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#reset-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#reset-btn:hover { background-color: #da190b; }</style></head><body><div class="container"><h1>好朋友的好处</h1><div class="game-area"><div class="column"><h3>左侧项目</h3><div id="left-items"><div class="item" draggable="true" data-id="0">信任</div><div class="item" draggable="true" data-id="1">信任</div><div class="item" draggable="true" data-id="2">陪伴</div><div class="item" draggable="true" data-id="3">陪伴</div><div class="item" draggable="true" data-id="4">鼓励</div><div class="item" draggable="true" data-id="5">鼓励</div><div class="item" draggable="true" data-id="6">分享</div><div class="item" draggable="true" data-id="7">分享</div><div class="item" draggable="true" data-id="8">成长</div><div class="item" draggable="true" data-id="9">成长</div></div></div><div class="column"><h3>右侧匹配</h3><div id="right-items"><div class="drop-zone" data-id="0">好朋友之间可以放心分享秘密</div><div class="drop-zone" data-id="1">在困难时能获得支持和理解</div><div class="drop-zone" data-id="2">在孤独时给予温暖的陪伴</div><div class="drop-zone" data-id="3">一起度过快乐或艰难的时光</div><div class="drop-zone" data-id="4">在失败时给予安慰和激励</div><div class="drop-zone" data-id="5">帮助彼此建立自信</div><div class="drop-zone" data-id="6">分享生活中的喜怒哀乐</div><div class="drop-zone" data-id="7">共同体验新事物和乐趣</div><div class="drop-zone" data-id="8">通过朋友的反馈获得自我提升</div><div class="drop-zone" data-id="9">互相学习，拓宽视野</div></div></div></div><div id="result"></div><button id="reset-btn">重新开始</button></div><script>const pairs = [{"left": "\u4fe1\u4efb", "right": "\u597d\u670b\u53cb\u4e4b\u95f4\u53ef\u4ee5\u653e\u5fc3\u5206\u4eab\u79d8\u5bc6"}, {"left": "\u4fe1\u4efb", "right": "\u5728\u56f0\u96be\u65f6\u80fd\u83b7\u5f97\u652f\u6301\u548c\u7406\u89e3"}, {"left": "\u966a\u4f34", "right": "\u5728\u5b64\u72ec\u65f6\u7ed9\u4e88\u6e29\u6696\u7684\u966a\u4f34"}, {"left": "\u966a\u4f34", "right": "\u4e00\u8d77\u5ea6\u8fc7\u5feb\u4e50\u6216\u8270\u96be\u7684\u65f6\u5149"}, {"left": "\u9f13\u52b1", "right": "\u5728\u5931\u8d25\u65f6\u7ed9\u4e88\u5b89\u6170\u548c\u6fc0\u52b1"}, {"left": "\u9f13\u52b1", "right": "\u5e2e\u52a9\u5f7c\u6b64\u5efa\u7acb\u81ea\u4fe1"}, {"left": "\u5206\u4eab", "right": "\u5206\u4eab\u751f\u6d3b\u4e2d\u7684\u559c\u6012\u54c0\u4e50"}, {"left": "\u5206\u4eab", "right": "\u5171\u540c\u4f53\u9a8c\u65b0\u4e8b\u7269\u548c\u4e50\u8da3"}, {"left": "\u6210\u957f", "right": "\u901a\u8fc7\u670b\u53cb\u7684\u53cd\u9988\u83b7\u5f97\u81ea\u6211\u63d0\u5347"}, {"left": "\u6210\u957f", "right": "\u4e92\u76f8\u5b66\u4e60\uff0c\u62d3\u5bbd\u89c6\u91ce"}];const leftItems = document.querySelectorAll(".item");const dropZones = document.querySelectorAll(".drop-zone");const resultDiv = document.getElementById("result");const resetBtn = document.getElementById("reset-btn");let draggedItem = null;leftItems.forEach(item => {item.addEventListener("dragstart", function(e) {draggedItem = this;setTimeout(() => this.style.opacity = "0.5", 0);});item.addEventListener("dragend", function() {this.style.opacity = "1";draggedItem = null;});});dropZones.forEach(zone => {zone.addEventListener("dragover", function(e) {e.preventDefault();this.classList.add("active");});zone.addEventListener("dragleave", function() {this.classList.remove("active");});zone.addEventListener("drop", function(e) {e.preventDefault();this.classList.remove("active");const draggedId = draggedItem.dataset.id;const dropId = this.dataset.id;if (draggedId === dropId) {this.classList.add("correct");draggedItem.style.opacity = "0.5";draggedItem.draggable = false;} else {this.classList.add("incorrect");setTimeout(() => this.classList.remove("incorrect"), 1000);}checkGameComplete();});});function checkGameComplete() {const correctZones = document.querySelectorAll(".drop-zone.correct");if (correctZones.length === pairs.length) {resultDiv.textContent = "游戏完成! 所有匹配都正确!";}}resetBtn.addEventListener("click", function() {dropZones.forEach(zone => {zone.classList.remove("correct", "incorrect");});leftItems.forEach(item => {item.style.opacity = "1";item.draggable = true;});resultDiv.textContent = "";});</script></body></html>

<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>好朋友的好处 - 问答游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.question { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }.question h3 { margin-top: 0; color: #555; }.options { margin-top: 10px; }.option { margin: 5px 0; padding: 10px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }.option:hover { background-color: #e9e9e9; }.option.correct { background-color: #d4edda; border-color: #c3e6cb; }.option.incorrect { background-color: #f8d7da; border-color: #f5c6cb; }.option.selected { background-color: #e3f2fd; border-color: #bbdefb; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#submit-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#submit-btn:hover { background-color: #45a049; }</style></head><body><div class="container"><h1>好朋友的好处</h1><div id="quiz"><div class="question"><h3>问题 1: 好朋友可以帮助我们做什么？</h3><div class="options"><div class="option" data-question="0" data-option="0">总是让我们开心</div><div class="option" data-question="0" data-option="1">在我们需要时给予支持</div><div class="option" data-question="0" data-option="2">经常和我们竞争</div><div class="option" data-question="0" data-option="3">不让我们犯错误</div></div></div><div class="question"><h3>问题 2: 好朋友之间应该具备什么品质？</h3><div class="options"><div class="option" data-question="1" data-option="0">互相欺骗</div><div class="option" data-question="1" data-option="1">互相尊重</div><div class="option" data-question="1" data-option="2">只关心自己</div><div class="option" data-question="1" data-option="3">经常吵架</div></div></div><div class="question"><h3>问题 3: 与好朋友相处时，最重要的是什么？</h3><div class="options"><div class="option" data-question="2" data-option="0">经常送礼物</div><div class="option" data-question="2" data-option="1">互相理解</div><div class="option" data-question="2" data-option="2">总是听从对方</div><div class="option" data-question="2" data-option="3">避免表达真实想法</div></div></div><div class="question"><h3>问题 4: 好朋友能帮助我们提升哪方面的能力？</h3><div class="options"><div class="option" data-question="3" data-option="0">控制别人</div><div class="option" data-question="3" data-option="1">管理情绪</div><div class="option" data-question="3" data-option="2">忽略他人感受</div><div class="option" data-question="3" data-option="3">独自解决问题</div></div></div><div class="question"><h3>问题 5: 朋友间发生矛盾时，最好的处理方式是什么？</h3><div class="options"><div class="option" data-question="4" data-option="0">直接放弃友谊</div><div class="option" data-question="4" data-option="1">互相指责</div><div class="option" data-question="4" data-option="2">沟通并解决问题</div><div class="option" data-question="4" data-option="3">假装没发生</div></div></div></div><button id="submit-btn">提交答案</button><div id="result"></div></div><script>const questions = [{"question": "\u597d\u670b\u53cb\u53ef\u4ee5\u5e2e\u52a9\u6211\u4eec\u505a\u4ec0\u4e48\uff1f", "options": ["\u603b\u662f\u8ba9\u6211\u4eec\u5f00\u5fc3", "\u5728\u6211\u4eec\u9700\u8981\u65f6\u7ed9\u4e88\u652f\u6301", "\u7ecf\u5e38\u548c\u6211\u4eec\u7ade\u4e89", "\u4e0d\u8ba9\u6211\u4eec\u72af\u9519\u8bef"], "correct": 1}, {"question": "\u597d\u670b\u53cb\u4e4b\u95f4\u5e94\u8be5\u5177\u5907\u4ec0\u4e48\u54c1\u8d28\uff1f", "options": ["\u4e92\u76f8\u6b3a\u9a97", "\u4e92\u76f8\u5c0a\u91cd", "\u53ea\u5173\u5fc3\u81ea\u5df1", "\u7ecf\u5e38\u5435\u67b6"], "correct": 1}, {"question": "\u4e0e\u597d\u670b\u53cb\u76f8\u5904\u65f6\uff0c\u6700\u91cd\u8981\u7684\u662f\u4ec0\u4e48\uff1f", "options": ["\u7ecf\u5e38\u9001\u793c\u7269", "\u4e92\u76f8\u7406\u89e3", "\u603b\u662f\u542c\u4ece\u5bf9\u65b9", "\u907f\u514d\u8868\u8fbe\u771f\u5b9e\u60f3\u6cd5"], "correct": 1}, {"question": "\u597d\u670b\u53cb\u80fd\u5e2e\u52a9\u6211\u4eec\u63d0\u5347\u54ea\u65b9\u9762\u7684\u80fd\u529b\uff1f", "options": ["\u63a7\u5236\u522b\u4eba", "\u7ba1\u7406\u60c5\u7eea", "\u5ffd\u7565\u4ed6\u4eba\u611f\u53d7", "\u72ec\u81ea\u89e3\u51b3\u95ee\u9898"], "correct": 1}, {"question": "\u670b\u53cb\u95f4\u53d1\u751f\u77db\u76fe\u65f6\uff0c\u6700\u597d\u7684\u5904\u7406\u65b9\u5f0f\u662f\u4ec0\u4e48\uff1f", "options": ["\u76f4\u63a5\u653e\u5f03\u53cb\u8c0a", "\u4e92\u76f8\u6307\u8d23", "\u6c9f\u901a\u5e76\u89e3\u51b3\u95ee\u9898", "\u5047\u88c5\u6ca1\u53d1\u751f"], "correct": 2}];const options = document.querySelectorAll(".option");const submitBtn = document.getElementById("submit-btn");const resultDiv = document.getElementById("result");let selectedAnswers = {};options.forEach(option => {option.addEventListener("click", function() {const question = this.getAttribute("data-question");const optionValue = this.getAttribute("data-option");document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === question) {opt.classList.remove("selected");}});this.classList.add("selected");selectedAnswers[question] = optionValue;});});submitBtn.addEventListener("click", function() {let score = 0;questions.forEach((q, index) => {const selected = selectedAnswers[index];if (selected && parseInt(selected) === q.correct) {score++;document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});} else if (selected) {document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === selected.toString()) {opt.classList.add("incorrect");}});document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});}});resultDiv.textContent = "得分: " + score + "/" + questions.length;submitBtn.disabled = true;});</script></body></html>

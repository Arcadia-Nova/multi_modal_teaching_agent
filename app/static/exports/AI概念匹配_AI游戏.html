<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI概念匹配 - 匹配游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.game-area { display: flex; justify-content: space-around; margin: 20px 0; }.column { flex: 1; padding: 10px; }.item { padding: 10px; margin: 5px 0; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: grab; text-align: center; }.item:active { cursor: grabbing; }.drop-zone { min-height: 50px; border: 2px dashed #ccc; border-radius: 4px; margin: 5px 0; padding: 10px; text-align: center; }.drop-zone.active { border-color: #4CAF50; background-color: #f0f8f0; }.drop-zone.correct { border-color: #4CAF50; background-color: #d4edda; }.drop-zone.incorrect { border-color: #f44336; background-color: #f8d7da; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#reset-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#reset-btn:hover { background-color: #da190b; }</style></head><body><div class="container"><h1>AI概念匹配</h1><div class="game-area"><div class="column"><h3>左侧项目</h3><div id="left-items"><div class="item" draggable="true" data-id="0">机器学习</div><div class="item" draggable="true" data-id="1">机器学习</div><div class="item" draggable="true" data-id="2">自然语言处理</div><div class="item" draggable="true" data-id="3">自然语言处理</div><div class="item" draggable="true" data-id="4">深度学习</div><div class="item" draggable="true" data-id="5">深度学习</div><div class="item" draggable="true" data-id="6">计算机视觉</div><div class="item" draggable="true" data-id="7">计算机视觉</div><div class="item" draggable="true" data-id="8">强化学习</div><div class="item" draggable="true" data-id="9">强化学习</div></div></div><div class="column"><h3>右侧匹配</h3><div id="right-items"><div class="drop-zone" data-id="0">一种让计算机通过数据学习规律并做出预测的方法</div><div class="drop-zone" data-id="1">依赖于大量数据进行模型训练</div><div class="drop-zone" data-id="2">使计算机能够理解、解析和生成人类语言的技术</div><div class="drop-zone" data-id="3">常用于聊天机器人和语音助手</div><div class="drop-zone" data-id="4">基于多层神经网络的机器学习方法</div><div class="drop-zone" data-id="5">在图像识别和语音识别中表现优异</div><div class="drop-zone" data-id="6">让计算机能够理解和分析图像或视频的技术</div><div class="drop-zone" data-id="7">应用于人脸识别和自动驾驶</div><div class="drop-zone" data-id="8">通过试错与环境互动来学习最优策略的方法</div><div class="drop-zone" data-id="9">常用于游戏AI和机器人控制</div></div></div></div><div id="result"></div><button id="reset-btn">重新开始</button></div><script>const pairs = [{"left": "\u673a\u5668\u5b66\u4e60", "right": "\u4e00\u79cd\u8ba9\u8ba1\u7b97\u673a\u901a\u8fc7\u6570\u636e\u5b66\u4e60\u89c4\u5f8b\u5e76\u505a\u51fa\u9884\u6d4b\u7684\u65b9\u6cd5"}, {"left": "\u673a\u5668\u5b66\u4e60", "right": "\u4f9d\u8d56\u4e8e\u5927\u91cf\u6570\u636e\u8fdb\u884c\u6a21\u578b\u8bad\u7ec3"}, {"left": "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "right": "\u4f7f\u8ba1\u7b97\u673a\u80fd\u591f\u7406\u89e3\u3001\u89e3\u6790\u548c\u751f\u6210\u4eba\u7c7b\u8bed\u8a00\u7684\u6280\u672f"}, {"left": "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "right": "\u5e38\u7528\u4e8e\u804a\u5929\u673a\u5668\u4eba\u548c\u8bed\u97f3\u52a9\u624b"}, {"left": "\u6df1\u5ea6\u5b66\u4e60", "right": "\u57fa\u4e8e\u591a\u5c42\u795e\u7ecf\u7f51\u7edc\u7684\u673a\u5668\u5b66\u4e60\u65b9\u6cd5"}, {"left": "\u6df1\u5ea6\u5b66\u4e60", "right": "\u5728\u56fe\u50cf\u8bc6\u522b\u548c\u8bed\u97f3\u8bc6\u522b\u4e2d\u8868\u73b0\u4f18\u5f02"}, {"left": "\u8ba1\u7b97\u673a\u89c6\u89c9", "right": "\u8ba9\u8ba1\u7b97\u673a\u80fd\u591f\u7406\u89e3\u548c\u5206\u6790\u56fe\u50cf\u6216\u89c6\u9891\u7684\u6280\u672f"}, {"left": "\u8ba1\u7b97\u673a\u89c6\u89c9", "right": "\u5e94\u7528\u4e8e\u4eba\u8138\u8bc6\u522b\u548c\u81ea\u52a8\u9a7e\u9a76"}, {"left": "\u5f3a\u5316\u5b66\u4e60", "right": "\u901a\u8fc7\u8bd5\u9519\u4e0e\u73af\u5883\u4e92\u52a8\u6765\u5b66\u4e60\u6700\u4f18\u7b56\u7565\u7684\u65b9\u6cd5"}, {"left": "\u5f3a\u5316\u5b66\u4e60", "right": "\u5e38\u7528\u4e8e\u6e38\u620fAI\u548c\u673a\u5668\u4eba\u63a7\u5236"}];const leftItems = document.querySelectorAll(".item");const dropZones = document.querySelectorAll(".drop-zone");const resultDiv = document.getElementById("result");const resetBtn = document.getElementById("reset-btn");let draggedItem = null;leftItems.forEach(item => {item.addEventListener("dragstart", function(e) {draggedItem = this;setTimeout(() => this.style.opacity = "0.5", 0);});item.addEventListener("dragend", function() {this.style.opacity = "1";draggedItem = null;});});dropZones.forEach(zone => {zone.addEventListener("dragover", function(e) {e.preventDefault();this.classList.add("active");});zone.addEventListener("dragleave", function() {this.classList.remove("active");});zone.addEventListener("drop", function(e) {e.preventDefault();this.classList.remove("active");const draggedId = draggedItem.dataset.id;const dropId = this.dataset.id;if (draggedId === dropId) {this.classList.add("correct");draggedItem.style.opacity = "0.5";draggedItem.draggable = false;} else {this.classList.add("incorrect");setTimeout(() => this.classList.remove("incorrect"), 1000);}checkGameComplete();});});function checkGameComplete() {const correctZones = document.querySelectorAll(".drop-zone.correct");if (correctZones.length === pairs.length) {resultDiv.textContent = "游戏完成! 所有匹配都正确!";}}resetBtn.addEventListener("click", function() {dropZones.forEach(zone => {zone.classList.remove("correct", "incorrect");});leftItems.forEach(item => {item.style.opacity = "1";item.draggable = true;});resultDiv.textContent = "";});</script></body></html>

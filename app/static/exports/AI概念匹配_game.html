<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI概念匹配 - 匹配游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.game-area { display: flex; justify-content: space-around; margin: 20px 0; }.column { flex: 1; padding: 10px; }.item { padding: 10px; margin: 5px 0; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: grab; text-align: center; }.item:active { cursor: grabbing; }.drop-zone { min-height: 50px; border: 2px dashed #ccc; border-radius: 4px; margin: 5px 0; padding: 10px; text-align: center; }.drop-zone.active { border-color: #4CAF50; background-color: #f0f8f0; }.drop-zone.correct { border-color: #4CAF50; background-color: #d4edda; }.drop-zone.incorrect { border-color: #f44336; background-color: #f8d7da; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#reset-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#reset-btn:hover { background-color: #da190b; }</style></head><body><div class="container"><h1>AI概念匹配</h1><div class="game-area"><div class="column"><h3>左侧项目</h3><div id="left-items"><div class="item" draggable="true" data-id="0">监督学习</div><div class="item" draggable="true" data-id="1">监督学习</div><div class="item" draggable="true" data-id="2">无监督学习</div><div class="item" draggable="true" data-id="3">无监督学习</div></div></div><div class="column"><h3>右侧匹配</h3><div id="right-items"><div class="drop-zone" data-id="0">分类</div><div class="drop-zone" data-id="1">回归</div><div class="drop-zone" data-id="2">聚类</div><div class="drop-zone" data-id="3">降维</div></div></div></div><div id="result"></div><button id="reset-btn">重新开始</button></div><script>const pairs = [{"left": "\u76d1\u7763\u5b66\u4e60", "right": "\u5206\u7c7b"}, {"left": "\u76d1\u7763\u5b66\u4e60", "right": "\u56de\u5f52"}, {"left": "\u65e0\u76d1\u7763\u5b66\u4e60", "right": "\u805a\u7c7b"}, {"left": "\u65e0\u76d1\u7763\u5b66\u4e60", "right": "\u964d\u7ef4"}];const leftItems = document.querySelectorAll(".item");const dropZones = document.querySelectorAll(".drop-zone");const resultDiv = document.getElementById("result");const resetBtn = document.getElementById("reset-btn");let draggedItem = null;leftItems.forEach(item => {item.addEventListener("dragstart", function(e) {draggedItem = this;setTimeout(() => this.style.opacity = "0.5", 0);});item.addEventListener("dragend", function() {this.style.opacity = "1";draggedItem = null;});});dropZones.forEach(zone => {zone.addEventListener("dragover", function(e) {e.preventDefault();this.classList.add("active");});zone.addEventListener("dragleave", function() {this.classList.remove("active");});zone.addEventListener("drop", function(e) {e.preventDefault();this.classList.remove("active");const draggedId = draggedItem.dataset.id;const dropId = this.dataset.id;if (draggedId === dropId) {this.classList.add("correct");draggedItem.style.opacity = "0.5";draggedItem.draggable = false;} else {this.classList.add("incorrect");setTimeout(() => this.classList.remove("incorrect"), 1000);}checkGameComplete();});});function checkGameComplete() {const correctZones = document.querySelectorAll(".drop-zone.correct");if (correctZones.length === pairs.length) {resultDiv.textContent = "游戏完成! 所有匹配都正确!";}}resetBtn.addEventListener("click", function() {dropZones.forEach(zone => {zone.classList.remove("correct", "incorrect");});leftItems.forEach(item => {item.style.opacity = "1";item.draggable = true;});resultDiv.textContent = "";});</script></body></html>

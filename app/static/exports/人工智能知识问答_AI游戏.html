<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>人工智能知识 - 问答游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.question { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }.question h3 { margin-top: 0; color: #555; }.options { margin-top: 10px; }.option { margin: 5px 0; padding: 10px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }.option:hover { background-color: #e9e9e9; }.option.correct { background-color: #d4edda; border-color: #c3e6cb; }.option.incorrect { background-color: #f8d7da; border-color: #f5c6cb; }.option.selected { background-color: #e3f2fd; border-color: #bbdefb; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#submit-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#submit-btn:hover { background-color: #45a049; }</style></head><body><div class="container"><h1>人工智能知识</h1><div id="quiz"><div class="question"><h3>问题 1: 以下哪一项是人工智能的核心目标？</h3><div class="options"><div class="option" data-question="0" data-option="0">完全替代人类决策</div><div class="option" data-question="0" data-option="1">模仿人类智能行为</div><div class="option" data-question="0" data-option="2">提高计算机运算速度</div><div class="option" data-question="0" data-option="3">减少数据存储需求</div></div></div><div class="question"><h3>问题 2: 机器学习属于人工智能的哪个分支？</h3><div class="options"><div class="option" data-question="1" data-option="0">自然语言处理</div><div class="option" data-question="1" data-option="1">计算机视觉</div><div class="option" data-question="1" data-option="2">机器学习</div><div class="option" data-question="1" data-option="3">机器人技术</div></div></div><div class="question"><h3>问题 3: 以下哪种算法常用于图像识别任务？</h3><div class="options"><div class="option" data-question="2" data-option="0">线性回归</div><div class="option" data-question="2" data-option="1">决策树</div><div class="option" data-question="2" data-option="2">神经网络</div><div class="option" data-question="2" data-option="3">K-均值聚类</div></div></div><div class="question"><h3>问题 4: 人工智能在医疗领域的主要应用之一是什么？</h3><div class="options"><div class="option" data-question="3" data-option="0">完全取代医生</div><div class="option" data-question="3" data-option="1">辅助诊断和治疗</div><div class="option" data-question="3" data-option="2">制造医疗器械</div><div class="option" data-question="3" data-option="3">控制医院设备</div></div></div><div class="question"><h3>问题 5: 以下哪项是人工智能的局限性？</h3><div class="options"><div class="option" data-question="4" data-option="0">无法处理复杂数据</div><div class="option" data-question="4" data-option="1">缺乏创造力</div><div class="option" data-question="4" data-option="2">不能理解人类情感</div><div class="option" data-question="4" data-option="3">无法进行自我学习</div></div></div></div><button id="submit-btn">提交答案</button><div id="result"></div></div><script>const questions = [{"question": "\u4ee5\u4e0b\u54ea\u4e00\u9879\u662f\u4eba\u5de5\u667a\u80fd\u7684\u6838\u5fc3\u76ee\u6807\uff1f", "options": ["\u5b8c\u5168\u66ff\u4ee3\u4eba\u7c7b\u51b3\u7b56", "\u6a21\u4eff\u4eba\u7c7b\u667a\u80fd\u884c\u4e3a", "\u63d0\u9ad8\u8ba1\u7b97\u673a\u8fd0\u7b97\u901f\u5ea6", "\u51cf\u5c11\u6570\u636e\u5b58\u50a8\u9700\u6c42"], "correct": 0}, {"question": "\u673a\u5668\u5b66\u4e60\u5c5e\u4e8e\u4eba\u5de5\u667a\u80fd\u7684\u54ea\u4e2a\u5206\u652f\uff1f", "options": ["\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u8ba1\u7b97\u673a\u89c6\u89c9", "\u673a\u5668\u5b66\u4e60", "\u673a\u5668\u4eba\u6280\u672f"], "correct": 0}, {"question": "\u4ee5\u4e0b\u54ea\u79cd\u7b97\u6cd5\u5e38\u7528\u4e8e\u56fe\u50cf\u8bc6\u522b\u4efb\u52a1\uff1f", "options": ["\u7ebf\u6027\u56de\u5f52", "\u51b3\u7b56\u6811", "\u795e\u7ecf\u7f51\u7edc", "K-\u5747\u503c\u805a\u7c7b"], "correct": 0}, {"question": "\u4eba\u5de5\u667a\u80fd\u5728\u533b\u7597\u9886\u57df\u7684\u4e3b\u8981\u5e94\u7528\u4e4b\u4e00\u662f\u4ec0\u4e48\uff1f", "options": ["\u5b8c\u5168\u53d6\u4ee3\u533b\u751f", "\u8f85\u52a9\u8bca\u65ad\u548c\u6cbb\u7597", "\u5236\u9020\u533b\u7597\u5668\u68b0", "\u63a7\u5236\u533b\u9662\u8bbe\u5907"], "correct": 0}, {"question": "\u4ee5\u4e0b\u54ea\u9879\u662f\u4eba\u5de5\u667a\u80fd\u7684\u5c40\u9650\u6027\uff1f", "options": ["\u65e0\u6cd5\u5904\u7406\u590d\u6742\u6570\u636e", "\u7f3a\u4e4f\u521b\u9020\u529b", "\u4e0d\u80fd\u7406\u89e3\u4eba\u7c7b\u60c5\u611f", "\u65e0\u6cd5\u8fdb\u884c\u81ea\u6211\u5b66\u4e60"], "correct": 0}];const options = document.querySelectorAll(".option");const submitBtn = document.getElementById("submit-btn");const resultDiv = document.getElementById("result");let selectedAnswers = {};options.forEach(option => {option.addEventListener("click", function() {const question = this.getAttribute("data-question");const optionValue = this.getAttribute("data-option");document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === question) {opt.classList.remove("selected");}});this.classList.add("selected");selectedAnswers[question] = optionValue;});});submitBtn.addEventListener("click", function() {let score = 0;questions.forEach((q, index) => {const selected = selectedAnswers[index];if (selected && parseInt(selected) === q.correct) {score++;document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});} else if (selected) {document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === selected.toString()) {opt.classList.add("incorrect");}});document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});}});resultDiv.textContent = "得分: " + score + "/" + questions.length;submitBtn.disabled = true;});</script></body></html>

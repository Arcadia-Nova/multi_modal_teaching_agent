<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>人工智能知识 - 问答游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.question { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }.question h3 { margin-top: 0; color: #555; }.options { margin-top: 10px; }.option { margin: 5px 0; padding: 10px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }.option:hover { background-color: #e9e9e9; }.option.correct { background-color: #d4edda; border-color: #c3e6cb; }.option.incorrect { background-color: #f8d7da; border-color: #f5c6cb; }.option.selected { background-color: #e3f2fd; border-color: #bbdefb; }#result { margin-top: 20px; padding: 15px; background-color: #e3f2fd; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; }#submit-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#submit-btn:hover { background-color: #45a049; }</style></head><body><div class="container"><h1>人工智能知识</h1><div id="quiz"><div class="question"><h3>问题 1: 人工智能的英文缩写是什么？</h3><div class="options"><div class="option" data-question="0" data-option="0">AI</div><div class="option" data-question="0" data-option="1">IB</div><div class="option" data-question="0" data-option="2">IC</div><div class="option" data-question="0" data-option="3">ID</div></div></div><div class="question"><h3>问题 2: 以下哪一项是人工智能的一个主要应用领域？</h3><div class="options"><div class="option" data-question="1" data-option="0">医疗诊断</div><div class="option" data-question="1" data-option="1">烹饪</div><div class="option" data-question="1" data-option="2">园艺</div><div class="option" data-question="1" data-option="3">步行</div></div></div><div class="question"><h3>问题 3: 机器学习属于人工智能的哪个分支？</h3><div class="options"><div class="option" data-question="2" data-option="0">深度学习</div><div class="option" data-question="2" data-option="1">自然语言处理</div><div class="option" data-question="2" data-option="2">计算机视觉</div><div class="option" data-question="2" data-option="3">数据挖掘</div></div></div><div class="question"><h3>问题 4: 以下哪项技术最常用于图像识别？</h3><div class="options"><div class="option" data-question="3" data-option="0">神经网络</div><div class="option" data-question="3" data-option="1">区块链</div><div class="option" data-question="3" data-option="2">云计算</div><div class="option" data-question="3" data-option="3">数据库</div></div></div><div class="question"><h3>问题 5: 人工智能的‘强人工智能’指的是什么？</h3><div class="options"><div class="option" data-question="4" data-option="0">能够执行特定任务的系统</div><div class="option" data-question="4" data-option="1">具有人类水平智能的系统</div><div class="option" data-question="4" data-option="2">只能进行简单计算的系统</div><div class="option" data-question="4" data-option="3">无法自主学习的系统</div></div></div></div><button id="submit-btn">提交答案</button><div id="result"></div></div><script>const questions = [{"question": "\u4eba\u5de5\u667a\u80fd\u7684\u82f1\u6587\u7f29\u5199\u662f\u4ec0\u4e48\uff1f", "options": ["AI", "IB", "IC", "ID"], "correct": 0}, {"question": "\u4ee5\u4e0b\u54ea\u4e00\u9879\u662f\u4eba\u5de5\u667a\u80fd\u7684\u4e00\u4e2a\u4e3b\u8981\u5e94\u7528\u9886\u57df\uff1f", "options": ["\u533b\u7597\u8bca\u65ad", "\u70f9\u996a", "\u56ed\u827a", "\u6b65\u884c"], "correct": 0}, {"question": "\u673a\u5668\u5b66\u4e60\u5c5e\u4e8e\u4eba\u5de5\u667a\u80fd\u7684\u54ea\u4e2a\u5206\u652f\uff1f", "options": ["\u6df1\u5ea6\u5b66\u4e60", "\u81ea\u7136\u8bed\u8a00\u5904\u7406", "\u8ba1\u7b97\u673a\u89c6\u89c9", "\u6570\u636e\u6316\u6398"], "correct": 0}, {"question": "\u4ee5\u4e0b\u54ea\u9879\u6280\u672f\u6700\u5e38\u7528\u4e8e\u56fe\u50cf\u8bc6\u522b\uff1f", "options": ["\u795e\u7ecf\u7f51\u7edc", "\u533a\u5757\u94fe", "\u4e91\u8ba1\u7b97", "\u6570\u636e\u5e93"], "correct": 0}, {"question": "\u4eba\u5de5\u667a\u80fd\u7684\u2018\u5f3a\u4eba\u5de5\u667a\u80fd\u2019\u6307\u7684\u662f\u4ec0\u4e48\uff1f", "options": ["\u80fd\u591f\u6267\u884c\u7279\u5b9a\u4efb\u52a1\u7684\u7cfb\u7edf", "\u5177\u6709\u4eba\u7c7b\u6c34\u5e73\u667a\u80fd\u7684\u7cfb\u7edf", "\u53ea\u80fd\u8fdb\u884c\u7b80\u5355\u8ba1\u7b97\u7684\u7cfb\u7edf", "\u65e0\u6cd5\u81ea\u4e3b\u5b66\u4e60\u7684\u7cfb\u7edf"], "correct": 0}];const options = document.querySelectorAll(".option");const submitBtn = document.getElementById("submit-btn");const resultDiv = document.getElementById("result");let selectedAnswers = {};options.forEach(option => {option.addEventListener("click", function() {const question = this.getAttribute("data-question");const optionValue = this.getAttribute("data-option");document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === question) {opt.classList.remove("selected");}});this.classList.add("selected");selectedAnswers[question] = optionValue;});});submitBtn.addEventListener("click", function() {let score = 0;questions.forEach((q, index) => {const selected = selectedAnswers[index];if (selected && parseInt(selected) === q.correct) {score++;document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});} else if (selected) {document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === selected.toString()) {opt.classList.add("incorrect");}});document.querySelectorAll(".option").forEach(opt => {if (opt.getAttribute("data-question") === index.toString() && opt.getAttribute("data-option") === q.correct.toString()) {opt.classList.add("correct");}});}});resultDiv.textContent = "得分: " + score + "/" + questions.length;submitBtn.disabled = true;});</script></body></html>

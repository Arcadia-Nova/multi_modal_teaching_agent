<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI技术分类 - 交互式动画</title><style>body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f0f0; }.container { max-width: 1000px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.interactive-area { margin: 40px 0; }.interactive-item { margin: 20px 0; padding: 20px; border: 2px solid #ddd; border-radius: 8px; transition: all 0.3s ease; cursor: pointer; }.interactive-item:hover { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.2); }.interactive-item.active { border-color: #4CAF50; background-color: #f0f8f0; }.interactive-item h2 { margin-top: 0; color: #4CAF50; }.interactive-item p { margin-bottom: 0; color: #666; }.interactive-item .details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd; }.interactive-item.active .details { display: block; }.progress-bar { width: 100%; height: 20px; background-color: #f0f0f0; border-radius: 10px; margin: 20px 0; overflow: hidden; }.progress-fill { height: 100%; background-color: #4CAF50; width: 0%; transition: width 0.5s ease; }#progress-text { text-align: center; color: #666; }</style></head><body><div class="container"><h1>AI技术分类</h1><div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div><div id="progress-text">完成度: 0%</div><div class="interactive-area" id="interactive-area"><div class="interactive-item" id="item-0" onclick="toggleItem(0)"><h2>机器学习</h2><p>让计算机从数据中学习的技术</p><div class="details"><p>监督学习</p><p>无监督学习</p><p>强化学习</p></div></div><div class="interactive-item" id="item-1" onclick="toggleItem(1)"><h2>深度学习</h2><p>基于神经网络的机器学习方法</p><div class="details"><p>卷积神经网络</p><p>循环神经网络</p><p>生成对抗网络</p></div></div><div class="interactive-item" id="item-2" onclick="toggleItem(2)"><h2>自然语言处理</h2><p>让计算机理解和处理人类语言</p><div class="details"><p>文本分类</p><p>情感分析</p><p>机器翻译</p></div></div><div class="interactive-item" id="item-3" onclick="toggleItem(3)"><h2>计算机视觉</h2><p>让计算机理解和处理图像和视频</p><div class="details"><p>目标检测</p><p>图像分类</p><p>人脸识别</p></div></div></div></div><script>let activeItems = new Set();const totalItems = document.querySelectorAll(".interactive-item").length;function toggleItem(index) {const item = document.getElementById("item-" + index);if (item.classList.contains("active")) {item.classList.remove("active");activeItems.delete(index);} else {item.classList.add("active");activeItems.add(index);}updateProgress();}function updateProgress() {const progress = (activeItems.size / totalItems) * 100;document.getElementById("progress-fill").style.width = progress + "%";document.getElementById("progress-text").textContent = "完成度: " + Math.round(progress) + "%";}</script></body></html>

<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>好朋友的好处 - 记忆游戏</title><style>body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }.container { max-width: 800px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }h1 { text-align: center; color: #333; }.game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }.card { aspect-ratio: 1; background-color: #4CAF50; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s ease; }.card.flipped { background-color: #2196F3; }.card.matched { background-color: #ff9800; cursor: default; }#score { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; }#reset-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #f44336; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }#reset-btn:hover { background-color: #da190b; }</style></head><body><div class="container"><h1>好朋友的好处</h1><div id="score">尝试次数: 0</div><div class="game-board" id="game-board"></div><button id="reset-btn">重新开始</button></div><script>const cards = ["1. \u4e92\u76f8\u652f\u6301", "2. \u5206\u4eab\u5feb\u4e50", "3. \u503e\u8bc9\u5fc3\u4e8b", "4. \u5171\u540c\u6210\u957f", "5. \u4fe1\u4efb\u53ef\u9760", "6. \u966a\u4f34\u5de6\u53f3", "7. \u4e92\u76f8\u9f13\u52b1", "8. \u5fc3\u6709\u7075\u7280", "9. \u4e00\u8d77\u5192\u9669", "10. \u65e0\u8bdd\u4e0d\u8c08"];let gameBoard = document.getElementById("game-board");let scoreDisplay = document.getElementById("score");let resetBtn = document.getElementById("reset-btn");let flippedCards = [];let matchedPairs = 0;let attempts = 0;let gameActive = true;function initGame() {flippedCards = [];matchedPairs = 0;attempts = 0;gameActive = true;scoreDisplay.textContent = "尝试次数: " + attempts;gameBoard.innerHTML = "";let gameCards = [...cards, ...cards];gameCards.sort(() => Math.random() - 0.5);gameCards.forEach((card, index) => {const cardElement = document.createElement("div");cardElement.classList.add("card");cardElement.dataset.index = index;cardElement.dataset.value = card;cardElement.textContent = "?";cardElement.addEventListener("click", flipCard);gameBoard.appendChild(cardElement);});}function flipCard() {if (!gameActive || this.classList.contains("flipped") || this.classList.contains("matched")) {return;}this.classList.add("flipped");this.textContent = this.dataset.value;flippedCards.push(this);if (flippedCards.length === 2) {attempts++;scoreDisplay.textContent = "尝试次数: " + attempts;if (flippedCards[0].dataset.value === flippedCards[1].dataset.value) {flippedCards.forEach(card => {card.classList.add("matched");});matchedPairs++;if (matchedPairs === cards.length) {gameActive = false;scoreDisplay.textContent = "游戏完成! 尝试次数: " + attempts;}} else {gameActive = false;setTimeout(() => {flippedCards.forEach(card => {card.classList.remove("flipped");card.textContent = "?";});gameActive = true;}, 1000);}flippedCards = [];}}resetBtn.addEventListener("click", initGame);initGame();</script></body></html>
